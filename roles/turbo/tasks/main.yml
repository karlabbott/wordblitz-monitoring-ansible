---
- name: Upload turbo perf script to DB VM
  ansible.builtin.command:
    cmd: >-
      scp -o StrictHostKeyChecking=no
      {{ role_path }}/files/turbo.sh
      {{ ssh_user }}@{{ db_vm_host }}:/tmp/turbo.sh

- name: Install turbo perf script on DB VM
  ansible.builtin.command:
    cmd: >-
      ssh -o StrictHostKeyChecking=no {{ ssh_user }}@{{ db_vm_host }}
      "sudo mv /tmp/turbo.sh /usr/local/bin/turbo.sh && sudo chmod +x /usr/local/bin/turbo.sh"

- name: Tune PostgreSQL max_connections to {{ chaos_max_connections }}
  ansible.builtin.command:
    cmd: >-
      ssh -o StrictHostKeyChecking=no {{ ssh_user }}@{{ db_vm_host }}
      "sudo sed -i 's/^#*max_connections.*/max_connections = {{ chaos_max_connections }}/' /var/lib/pgsql/data/postgresql.conf
      && sudo systemctl restart postgresql"

- name: Ensure atd is running on DB VM
  ansible.builtin.command:
    cmd: >-
      ssh -o StrictHostKeyChecking=no {{ ssh_user }}@{{ db_vm_host }}
      "sudo dnf install -y at && sudo systemctl enable --now atd"

- name: Schedule turbo perf test in {{ chaos_delay_minutes }} minutes
  ansible.builtin.command:
    cmd: >-
      ssh -o StrictHostKeyChecking=no {{ ssh_user }}@{{ db_vm_host }}
      "echo 'sudo /usr/local/bin/turbo.sh' | at now + {{ chaos_delay_minutes }} minutes"
